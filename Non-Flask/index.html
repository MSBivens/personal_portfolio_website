<body>
    <div class="div-container">
        <div class="div-main">
            <!-- Education -->
            <section class="section" id="edu_section">
                <div>
                    <div class="accordion" id="accordionBasic">
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="headingOne">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                                    <p>Google Project Management Certificate</p>
                                </button>
                            </h2>
                            <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#accordionBasic">
                                <div class="accordion-body">
                                    <p>Coursera, 2021</p>
                                    <p>Achieved after completion of six courses developed by Google for the Coursera platform</p>
                                    <p><a href="https://www.credly.com/badges/7ef9ba5c-35a4-4b01-8b74-85dfeaf5a7d8/linked_in_profile">Verify with Credly</a></p>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="headingTwo">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                    <p>University of Idaho B.S.</p>
                                </button>
                            </h2>
                            <div id="collapseTwo" class="accordion-collapse collapse show" aria-labelledby="headingTwo" data-bs-parent="#accordionBasic">
                                <div class="accordion-body">
                                    <p>B.S. Political Science, Philosophy, 2019</p>
                                    <p><a href="https://nscverifications.org/degreeverify/">Verify with National Student Clearinghouse</a></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Contact -->
            <section class="section" id="contact_section">
                <div class="div-section-title">
                    <p class="txt-section-title">Contact</p>
                </div>
                <div>
                    <form action="//submit.form" id="contact-form" method="post" onsubmit="return ValidateForm(this)">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="contactname" placeholder="Name">
                            <label for="floatingPassword">Name</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                            <label for="floatingInput">Email address</label>
                        </div>
                        <div class="form-floating">
                            <textarea class="form-control" placeholder="Leave your message here" id="floatingTextarea" style="height: 100px"></textarea>
                            <label for="floatingTextarea">Message</label>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>
</body>
